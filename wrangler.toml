name = "maipal-api"
main = "worker/index.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

# Static assets — served from the Vite build output. Any request that doesn't
# match a Worker route falls through to a file in dist/ (with SPA fallback to
# index.html). This lets the web build live at the same origin as /api.
[assets]
directory = "./dist"
not_found_handling = "single-page-application"
binding = "ASSETS"

# D1 database. The id below is a placeholder — run:
#   npx wrangler d1 create maipal-db
# then paste the printed `database_id` here.
[[d1_databases]]
binding = "DB"
database_name = "maipal-db"
database_id = "933bb2fb-7158-49b0-b3df-b48fbb292fb9"
migrations_dir = "migrations"

[observability]
enabled = true

# AI layer. The CodeBuddy API key is a secret — set it with
#   npx wrangler secret put CODEBUDDY_API_KEY
# (and in .dev.vars for local dev). These [vars] are non-secret model/voice
# overrides; the worker falls back to sensible defaults when unset.
[vars]
CHAT_MODEL = "claude-sonnet-4.6-1m"
VISION_MODEL = "claude-sonnet-4.6-1m"
TTS_VOICE = "zh-CN-YunjianNeural"

[env.production]
# Customize for prod — separate D1 db, custom domain, etc.
